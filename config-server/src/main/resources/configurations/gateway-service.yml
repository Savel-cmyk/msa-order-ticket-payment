spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: order-service
          uri: lb:http://ORDER-SERVICE
          predicates:
            - Path=/api/v1/orders/**,/api/v1/customer/**
        - id: payment-service
          uri: lb:http://PAYMENT-SERVICE
          predicates:
            - Path=/api/v1/payment/**,/api/v1/currency/**
        - id: ticket-service
          uri: lb:http://TICKET-SERVICE
          predicates:
            - Path=/api/v1/tickets/**
server:
  port: ${GATEWAY_SERVER_PORT}

eureka:
  instance:
    hostname: ${GATEWAY_SERVICE_CONTAINER_NAME}
  client:
    registerWithEureka: true
    fetchRegistry: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    disable-swagger-default-url: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    urls:
      - url: /v3/api-docs
        name: Gateway Service
      - url: /api/v1/orders/v3/api-docs
        name: Order Service
      - url: /api/v1/payment/v3/api-docs
        name: Payment Service
      - url: /api/v1/tickets/v3/api-docs
        name: Ticket Service