spring:
  datasource:
    url: jdbc:postgresql://${PAYMENTDB_CONTAINER_NAME}:${POSTGRESDB_DOCKER_PORT}/${POSTGRESDB_PAYMENT_NAME}
    username: ${POSTGRESDB_USER}
    password: ${POSTGRESDB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate.ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_CONTAINER_NAME}:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: exchangeDto:com.travel.application.paymentservice.dto.CustomerAccountExchangeDto
    consumer:
      group-id: payment-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: '*'

server:
  port: ${PAYMENT_SERVER_PORT}

eureka:
  instance:
    hostname: ${PAYMENT_SERVICE_CONTAINER_NAME}
  client:
    registerWithEureka: true
    fetchRegistry: true

springdoc:
  api-docs:
    enable: true
    path: /api/v1/payment/v3/api-docs
  swagger-ui:
    enable: true
    disable-swagger-default-url: true
    path: /api/v1/payment/swagger-ui.html