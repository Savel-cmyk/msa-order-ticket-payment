spring:
  datasource:
    url: jdbc:postgresql://${TICKETSDB_CONTAINER_NAME}:${POSTGRESDB_DOCKER_PORT}/${POSTGRESDB_TICKETS_NAME}
    username: ${POSTGRESDB_USER}
    password: ${POSTGRESDB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_CONTAINER_NAME}:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: ticketBookingResponseDto:com.travel.application.ticketservice.dto.impl.TicketBookingResponseDto,ticketPaymentRequestDto:com.travel.application.ticketservice.dto.impl.TicketPaymentRequestDto,ticketResponseDto:com.travel.application.ticketservice.dto.TicketResponseDto
    consumer:
      group-id: ticket-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json:
          trusted.packages: '*'
          type.mapping: ticketInfoRequest:com.travel.application.ticketservice.dto.TicketInfoRequestDto,ticketPaymentResponse:com.travel.application.ticketservice.dto.impl.TicketBookingResponseDto,ticketBookingRequest:com.travel.application.ticketservice.dto.impl.TicketBookingRequestDto

server:
  port: ${TICKET_SERVER_PORT}

eureka:
  instance:
    hostname: ${TICKET_SERVICE_CONTAINER_NAME}
  client:
    registerWithEureka: true
    fetchRegistry: true

springdoc:
  api-docs:
    enable: true
    path: /api/v1/tickets/v3/api-docs
  swagger-ui:
    enable: true
    disable-swagger-default-url: true
    path: /api/v1/tickets/swagger-ui.html