spring:
  datasource:
    url: jdbc:postgresql://${TICKETSDB_CONTAINER_NAME}:${POSTGRESDB_DOCKER_PORT}/${POSTGRESDB_TICKETS_NAME}
    username: ${POSTGRESDB_USER}
    password: ${POSTGRESDB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_CONTAINER_NAME}:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: ticketResponseDto:com.travel.application.ticketservice.dto.TicketResponseDto
    consumer:
      group-id: ticket-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: '*'

server:
  port: ${TICKET_SERVER_PORT}

eureka:
  instance:
    hostname: ${TICKET_SERVICE_CONTAINER_NAME}
  client:
    registerWithEureka: true
    fetchRegistry: true