spring:
  datasource:
    url: jdbc:postgresql://${ORDERSDB_CONTAINER_NAME}:${POSTGRESDB_DOCKER_PORT}/${POSTGRESDB_ORDERS_NAME}
    username: ${POSTGRESDB_USER}
    password: ${POSTGRESDB_PASSWORD}
    driverClassName: org.postgresql.Driver
  jpa:
    hibernate.ddlAuto: update
    database: postgresql
    databasePlatform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrapServers: ${KAFKA_CONTAINER_NAME}:9092
    producer:
      keySerializer: org.apache.kafka.common.serialization.StringSerializer
      valueSerializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: ticketInfoRequest:com.travel.application.orderservice.dto.TicketInfoRequestDto,ticketBookingRequest:com.travel.application.orderservice.dto.TicketBookingRequestDto
    consumer:
      groupId: order-group
      autoOffsetReset: earliest
      keyDeserializer: org.apache.kafka.common.serialization.StringDeserializer
#      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      valueDeserializer: org.springframework.kafka.support.serializer.JsonDeserializer
#      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
#        spring:
#          deserializer:
#            value:
#              delegate:
#                class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json:
          trusted.packages: '*'
          type.mapping: ticketBookingResponseDto:com.travel.application.orderservice.dto.TicketBookingResponseDto,ticketResponseDto:com.travel.application.orderservice.dto.TicketResponseDto

server:
  port: ${ORDER_SERVER_PORT}

eureka:
  instance:
    hostname: ${ORDER_SERVICE_CONTAINER_NAME}
  client:
    registerWithEureka: true
    fetchRegistry: true

springdoc:
  api-docs:
    enabled: true
    path: /api/v1/orders/v3/api-docs
  swagger-ui:
    enabled: true
    disable-swagger-default-url: true
    path: /api/v1/orders/swagger-ui.html